# ─────────────────────────────────────────────────────────────────────────────
# Sherlock — local infrastructure (data plane backbone + stores)
#   Kafka (KRaft, single node) · Schema Registry · Kafka UI · Redis · Postgres · MinIO
# Bring up:  docker compose -f docker-compose.infra.yml up -d
# ─────────────────────────────────────────────────────────────────────────────
name: sherlock

services:
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    hostname: kafka
    container_name: sherlock-kafka
    ports:
      - "29092:29092"          # host-facing listener
    environment:
      # ── KRaft (no ZooKeeper) single-node broker+controller ──
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      # ── single-node replication settings ──
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      # fixed cluster id keeps the KRaft metadata log stable across restarts
      CLUSTER_ID: "MkU3OEVBRkNBRjZFNDIwNw"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      # Target the broker's own advertised listener (kafka:9092). Nothing binds
      # to localhost:9092 inside the container, so localhost would always fail.
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 15s
      timeout: 20s
      retries: 15
      start_period: 30s
    networks: [sherlock]

  kafka-init:
    image: confluentinc/cp-kafka:7.7.1
    container_name: sherlock-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./infra/local/kafka/create-topics.sh:/create-topics.sh:ro
    entrypoint: ["bash", "/create-topics.sh"]
    environment:
      KAFKA_BOOTSTRAP: "kafka:9092"
    restart: "no"
    networks: [sherlock]

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    hostname: schema-registry
    container_name: sherlock-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "PLAINTEXT://kafka:9092"
      SCHEMA_REGISTRY_LISTENERS: "http://0.0.0.0:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/subjects || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks: [sherlock]

  kafka-ui:
    image: kafbat/kafka-ui:latest
    container_name: sherlock-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: sherlock-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: "http://schema-registry:8081"
      DYNAMIC_CONFIG_ENABLED: "true"
    networks: [sherlock]

  redis:
    image: redis:7-alpine
    container_name: sherlock-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [sherlock]

  postgres:
    image: postgres:16-alpine
    container_name: sherlock-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-sherlock}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-sherlock}"
      POSTGRES_DB: "${POSTGRES_DB:-sherlock}"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/local/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sherlock} -d ${POSTGRES_DB:-sherlock}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [sherlock]

  minio:
    image: minio/minio:latest
    container_name: sherlock-minio
    ports:
      - "9000:9000"            # S3 API
      - "9001:9001"            # console
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-sherlock}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-sherlock123}"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks: [sherlock]

  minio-init:
    image: minio/mc:latest
    container_name: sherlock-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-sherlock} ${MINIO_ROOT_PASSWORD:-sherlock123}; do
        echo 'waiting for minio...'; sleep 2;
      done &&
      mc mb -p local/${MINIO_BUCKET_MEDIA:-sherlock-media} &&
      mc mb -p local/${MINIO_BUCKET_EMBEDDINGS:-sherlock-embeddings} &&
      echo 'minio buckets ready'
      "
    restart: "no"
    networks: [sherlock]

volumes:
  kafka_data:
  redis_data:
  pg_data:
  minio_data:

networks:
  sherlock:
    name: sherlock
    driver: bridge
