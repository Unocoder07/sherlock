server:
  port: ${SERVER_PORT:8090}

spring:
  application:
    name: meeting-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sherlock}
    username: ${DB_USER:sherlock}
    password: ${DB_PASSWORD:sherlock}

  jpa:
    hibernate:
      ddl-auto: none          # Flyway owns the schema, not Hibernate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    schemas: meeting          # history table lives in the meeting schema
    default-schema: meeting

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}

# Sherlock-specific knobs
sherlock:
  outbox:
    poll-interval-ms: 1000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true         # /actuator/health/liveness + /readiness

logging:
  level:
    com.sherlock: INFO
